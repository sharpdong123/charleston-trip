name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Google Places API key
        env:
          KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python3 - <<'PY'
          import os
          key = os.environ.get("KEY", "")
          with open("index.html", "r") as f:
              html = f.read()
          placeholder = "const GOOGLE_PLACES_API_KEY = '';"
          replacement = f"const GOOGLE_PLACES_API_KEY = '{key}';"
          if placeholder not in html:
              raise SystemExit("Placeholder not found in index.html")
          html = html.replace(placeholder, replacement, 1)
          with open("index.html", "w") as f:
              f.write(html)
          print("Injected key (length:", len(key), ")")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
